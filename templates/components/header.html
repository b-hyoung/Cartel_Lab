{% load static %}
<header class="site-header">
    <div class="header-inner">
        <a href="/" class="brand">
            <img src="{% static 'users/teamlab-logo.png' %}" alt="Team Lab Logo" class="brand-logo">
            <span>비전대학교 Lab</span>
        </a>
        <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="site-nav">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <nav class="nav-links" id="site-nav">
            <a href="/users/" class="nav-link">인원관리</a>
            <a href="/attendance/" class="nav-link">출결관리</a>
            <a href="/planner/" class="nav-link primary">목표/계획</a>
            <a href="/seats/" class="nav-link">좌석현황</a>
            <a href="/users/signup/" class="nav-link">신규등록</a>
            <a href="/users/login/" class="nav-link">로그인</a>
        </nav>
    </div>
</header>
<script>
    (function () {
        var toggle = document.querySelector(".menu-toggle");
        var nav = document.getElementById("site-nav");
        if (!toggle || !nav) return;

        function closeMenu() {
            nav.classList.remove("is-open");
            toggle.classList.remove("is-open");
            toggle.setAttribute("aria-expanded", "false");
            document.body.style.overflow = "";
        }
        toggle.addEventListener("click", function () {
            var open = nav.classList.toggle("is-open");
            toggle.classList.toggle("is-open", open);
            toggle.setAttribute("aria-expanded", open ? "true" : "false");
            document.body.style.overflow = open ? "hidden" : "";
        });

        nav.addEventListener("click", function (event) {
            if (event.target.classList.contains("nav-link")) {
                closeMenu();
            }
        });

        window.addEventListener("resize", function () {
            if (window.innerWidth > 760) {
                closeMenu();
            }
        });
    })();
</script>
